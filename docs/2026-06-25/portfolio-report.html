<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Report - 2026-06-25</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      line-height: 1.7;
      padding: 2rem;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 {
      font-size: 1.8rem;
      color: #fff;
      border-bottom: 2px solid #10b981;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
    }
    h2 {
      font-size: 1.4rem;
      color: #34d399;
      margin-top: 2rem;
      margin-bottom: 0.8rem;
      border-left: 4px solid #10b981;
      padding-left: 0.8rem;
    }
    h3 {
      font-size: 1.15rem;
      color: #6ee7b7;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    h4 {
      font-size: 1rem;
      color: #a5b4fc;
      margin-top: 1.2rem;
      margin-bottom: 0.4rem;
    }
    p { margin-bottom: 0.8rem; }
    ul { list-style: none; padding-left: 0; margin-bottom: 1rem; }
    li {
      padding: 0.5rem 0.8rem;
      margin-bottom: 0.3rem;
      background: #1e1e2e;
      border-radius: 6px;
      border-left: 3px solid #10b981;
    }
    strong { color: #fbbf24; }
    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 2rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      background: #1e1e2e;
      border-radius: 8px;
      overflow: hidden;
    }
    tr:first-child td {
      background: #2a2a3e;
      font-weight: bold;
      color: #6ee7b7;
    }
    td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    .timestamp {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .agent-card {
      background: #1e1e2e;
      border-radius: 8px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border-left: 4px solid #6366f1;
    }
    .agent-card h4 { color: #a5b4fc; margin-top: 0; }
    .discussion-card {
      background: #1a1a28;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      border-left: 4px solid #f59e0b;
    }
    .discussion-card h4 { color: #fbbf24; margin-top: 0; }
  </style>

</head>
<body>
  <div class="container">
    <h1>Portfolio Report - 2026-06-25</h1>
    <div class="agent-card">
      <h2>Phase 7 で実装予定</h2>
      <p>以下の機能が追加される予定です:</p>
      <ul>
        <li>保有銘柄の個別評価（保持/買増/一部売却/全売却）</li>
        <li>Daily Report 推奨銘柄の新規組入候補評価</li>
        <li>リバランス提案（具体的なアクションアイテム）</li>
      </ul>
    </div>
  </div>
</body>
</html>
