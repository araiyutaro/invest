<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Digest - 2026-07-11</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      line-height: 1.7;
      padding: 2rem;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 {
      font-size: 1.8rem;
      color: #fff;
      border-bottom: 2px solid #8b5cf6;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
    }
    h2 {
      font-size: 1.4rem;
      color: #a78bfa;
      margin-top: 2rem;
      margin-bottom: 0.8rem;
      border-left: 4px solid #8b5cf6;
      padding-left: 0.8rem;
    }
    h3 {
      font-size: 1.15rem;
      color: #c4b5fd;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    h4 {
      font-size: 1rem;
      color: #a5b4fc;
      margin-top: 1.2rem;
      margin-bottom: 0.4rem;
    }
    p { margin-bottom: 0.8rem; }
    ul { list-style: none; padding-left: 0; margin-bottom: 1rem; }
    li {
      padding: 0.5rem 0.8rem;
      margin-bottom: 0.3rem;
      background: #1e1e2e;
      border-radius: 6px;
      border-left: 3px solid #8b5cf6;
    }
    strong { color: #fbbf24; }
    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 2rem 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      background: #1e1e2e;
      border-radius: 8px;
      overflow: hidden;
    }
    tr:first-child td {
      background: #2a2a3e;
      font-weight: bold;
      color: #c4b5fd;
    }
    td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    .timestamp {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .agent-card {
      background: #1e1e2e;
      border-radius: 8px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border-left: 4px solid #6366f1;
    }
    .agent-card h4 { color: #a5b4fc; margin-top: 0; }
    .discussion-card {
      background: #1a1a28;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      border-left: 4px solid #f59e0b;
    }
    .discussion-card h4 { color: #fbbf24; margin-top: 0; }
    .ticker-pill {
      display: inline-block;
      background: #2a2a3e;
      color: #c4b5fd;
      font-size: 0.8rem;
      padding: 0.15rem 0.5rem;
      margin-right: 0.4rem;
      margin-bottom: 0.3rem;
      border-radius: 999px;
      border: 1px solid #3f3f5a;
    }
    .news-meta {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    .digest-crossref-chip {
      display: inline-block;
      background: #2a2a3e;
      color: #c4b5fd;
      font-size: 0.8rem;
      padding: 0.15rem 0.5rem;
      margin-right: 0.4rem;
      margin-bottom: 0.3rem;
      border-radius: 999px;
      border: 1px solid #a78bfa;
    }
    .digest-crossref-row {
      margin-bottom: 0.5rem;
    }
    .news-card a {
      color: #93c5fd;
    }
    .news-card a:visited {
      color: #c4b5fd;
    }
    .news-card a:hover {
      color: #bfdbfe;
    }
    @media (max-width: 768px) {
      body { padding: 1rem; }
      .container { max-width: 100%; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
      h1 { font-size: 1.4rem; }
      .report-links a, summary { min-height: 44px; display: inline-flex; align-items: center; }
    }
  </style>

</head>
<body>
  <div class="container">
    <h1>News Digest - 2026-07-11 <span style="font-size:1rem;font-weight:normal;color:#a78bfa;">AI厳選ニュースダイジェスト</span></h1>
    <p class="timestamp">生成日時: 2026/7/11 8:06:02</p>
    <div class="agent-card"><p>本日は厳選記事なし</p></div>
  </div>
</body>
</html>
