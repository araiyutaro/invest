name: Daily Investment Report

on:
  schedule:
    # 7:00 JST = 22:00 UTC (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Generate daily report
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TZ: Asia/Tokyo
        run: |
          echo "v2.0: Daily reports are generated via /invest skill command in Claude Code."
          echo "This workflow is retained for future v2.0 CI integration."
